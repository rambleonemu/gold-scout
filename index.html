<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow, noarchive" />
<title>GScout</title>
<link rel="icon" type="image/png" href="GScout_Favicon.png">
<link rel="apple-touch-icon" href="GScout_Icon.png">
<style>
  :root { color-scheme: dark; }
  .mascot { position:fixed; bottom:0; right:0; width:160px; pointer-events:none;
             opacity:0.13; z-index:0; filter:saturate(0.6);
             transition:opacity .3s ease; }
  .mascot:hover { opacity:0.55; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#0a0a0b; color:#e5e5e5; font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
         -webkit-font-smoothing:antialiased; padding:24px 18px; }
  .wrap { max-width:820px; margin:0 auto; }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { display:flex; justify-content:space-between; align-items:flex-start;
           border-bottom:1px solid #262626; padding-bottom:16px; margin-bottom:18px; }
  h1 { font-family:ui-monospace,monospace; font-size:18px; font-weight:600; letter-spacing:-.3px; color:#fafafa;
       display:flex; align-items:center; gap:8px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#fbbf24; }
  .sub { font-size:12px; color:#737373; margin-top:4px; }
  .hbtn { background:none; border:none; color:#737373; font-size:11px; cursor:pointer; display:block; text-align:right; }
  .hbtn:hover { color:#fbbf24; }
  .next { font-family:ui-monospace,monospace; font-size:12px; color:#fcd34d; }
  .lastrun { font-family:ui-monospace,monospace; font-size:12px; color:#a3e635; margin-top:2px; }
  .label { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:#a3a3a3; }
  section { margin-bottom:20px; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .stat { border:1px solid #262626; background:rgba(23,23,23,.4); border-radius:10px; padding:12px; }
  .stat .v { font-family:ui-monospace,monospace; font-size:20px; font-weight:700; color:#fafafa; }
  .stat .k { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#737373; margin-top:2px; }
  .prices { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .price { border:1px solid #262626; background:rgba(23,23,23,.4); border-radius:10px; padding:10px 6px; text-align:center; }
  .price .pk { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#737373; }
  .price .pv { font-family:ui-monospace,monospace; font-size:14px; font-weight:600; color:#fcd34d; margin-top:3px; }
  .charts { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .card { border:1px solid #262626; background:rgba(23,23,23,.4); border-radius:12px; padding:14px; }
  .card h3 { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:#a3a3a3; margin-bottom:10px; font-weight:600; }
  .card .now { font-family:ui-monospace,monospace; font-size:13px; color:#e5e5e5; }
  svg { display:block; width:100%; height:auto; overflow:visible; }
  .panel { border:1px solid #262626; background:rgba(23,23,23,.5); border-radius:12px; padding:16px; }
  .row { display:flex; flex-wrap:wrap; gap:12px 16px; align-items:center; }
  .ctl { display:flex; flex-direction:column; gap:4px; }
  .ctl span { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#737373; }
  input[type=number],textarea,input[type=password]{ background:#0a0a0b; border:1px solid #2a2a2a; color:#e5e5e5;
     border-radius:8px; padding:7px 9px; font-family:ui-monospace,monospace; font-size:13px; }
  input[type=number]{ width:90px; }
  textarea{ width:100%; min-height:120px; resize:vertical; line-height:1.5; }
  input[type=range]{ accent-color:#f59e0b; }
  .chip { background:none; border:none; color:#a3a3a3; font-size:12px; padding:4px 8px; border-radius:6px; cursor:pointer; }
  .chip.on { background:rgba(245,158,11,.18); color:#fcd34d; }
  .toggle { display:inline-flex; align-items:center; gap:6px; cursor:pointer; font-size:12px; color:#a3a3a3; }
  .btn { background:#fbbf24; color:#0a0a0b; border:none; border-radius:8px; padding:8px 14px; font-size:13px;
         font-weight:600; cursor:pointer; }
  .btn.ghost { background:none; color:#a3a3a3; border:1px solid #333; }
  .btn.sm { padding:4px 9px; font-size:11px; }
  .btn:hover { filter:brightness(1.05); }
  .note { font-size:11px; color:#737373; line-height:1.5; }
  .warn { font-size:11px; color:#fbbf24; line-height:1.5; }
  .traps { font-size:11px; color:#737373; margin-bottom:12px; display:flex; gap:6px; align-items:center; }
  .deal { display:flex; gap:14px; align-items:center; border:1px solid #262626; background:rgba(23,23,23,.4);
          border-radius:10px; padding:12px 16px; margin-bottom:8px; transition:.15s; }
  .deal.trap { border-color:#5b2a2a; }
  .deal.seen { opacity:.5; }
  .deal.saved { border-color:#3f5a2a; }
  .deal:hover { border-color:#404040; background:#171717; }
  .deal .link { display:flex; gap:14px; align-items:center; flex:1; min-width:0; text-decoration:none; color:inherit; }
  .score { width:54px; height:54px; flex-shrink:0; border-radius:10px; background:#0a0a0b;
           display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score .n { font-family:ui-monospace,monospace; font-size:17px; font-weight:700; }
  .score .l { font-size:8px; text-transform:uppercase; letter-spacing:1px; color:#737373; }
  .title { font-size:14px; color:#e5e5e5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta { display:flex; flex-wrap:wrap; gap:2px 10px; font-family:ui-monospace,monospace; font-size:11px; color:#737373; margin-top:4px; }
  .reason { font-size:11px; color:#fb7185; margin-top:5px; line-height:1.4; }
  .why { font-size:11px; color:#6ee7b7; margin-top:5px; line-height:1.4; opacity:.85; }
  .mixed { font-size:11px; color:#c4b5fd; margin-top:5px; line-height:1.4; }
  .grn { color:#34d399; } .red { color:#fb7185; } .wht { color:#d4d4d4; } .amb { color:#fbbf24; }
  .acts { display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
  .iact { background:none; border:1px solid #333; color:#a3a3a3; border-radius:7px; width:34px; height:28px;
          cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
  .iact:hover { border-color:#555; color:#fafafa; }
  .iact.on { background:rgba(63,90,42,.3); border-color:#3f5a2a; color:#a3e635; }
  .tag { font-size:9px; padding:1px 5px; border-radius:4px; background:rgba(245,158,11,.15); color:#fcd34d; text-transform:uppercase; letter-spacing:.5px; }
  .tag.t { background:rgba(244,63,94,.15); color:#fb7185; }
  .tag.v { background:rgba(251,191,36,.15); color:#fbbf24; }
  .tag.m { background:rgba(167,139,250,.18); color:#c4b5fd; }
  .tag.tr { background:rgba(110,231,183,.18); color:#6ee7b7; }
  .deal.bought { border-color:#7c6f3a; background:rgba(124,111,58,.08); }
  .tag.n { background:rgba(52,211,153,.18); color:#34d399; }
  .tag.g { background:rgba(96,165,250,.15); color:#60a5fa; }
  .empty { border:1px solid #262626; background:rgba(23,23,23,.4); border-radius:10px;
           padding:24px; text-align:center; font-size:14px; color:#737373; }
  .foot { font-size:11px; line-height:1.6; color:#525252; margin-top:18px; }
  .head-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .hidden { display:none; }
  .chrt { position:relative; }
  .hit { cursor:crosshair; }
  .sec-hdr { display:flex; justify-content:space-between; align-items:center; cursor:pointer;
             user-select:none; padding:2px 0; margin-bottom:8px; }
  .sec-hdr .label { pointer-events:none; }
  .sec-toggle { font-size:11px; color:#525252; }
  .sec-hdr:hover .sec-toggle { color:#fbbf24; }
  .price-drop { color:#34d399; font-weight:600; }
  .price-rise { color:#fb7185; font-weight:600; }
  .age { color:#525252; }
  .copy-btn { background:none; border:none; color:#404040; font-size:11px; cursor:pointer;
              padding:1px 5px; border-radius:4px; transition:.15s; flex-shrink:0; }
  .copy-btn:hover { color:#a3a3a3; background:#1a1a1a; }
  .pilehdr { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:#a3e635; margin:14px 0 8px; }
  @media (max-width:640px){ .charts{grid-template-columns:1fr} .stats{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>
<div class="wrap" id="app">Loading…</div>

<script>
const KARATS = ["10K","14K","18K","22K","24K"];
const fmt = n => isFinite(n) ? n.toLocaleString("en-US",{style:"currency",currency:"USD"}) : "—";
const fmtK = n => isFinite(n) ? "$"+(n>=1000 ? (n/1000).toFixed(1)+"k" : n.toFixed(0)) : "—";

// ---- persisted sets (per device) ----
const LS = {
  get(k,def){ try{return JSON.parse(localStorage.getItem(k))??def}catch(e){return def} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v))}catch(e){} }
};
let SEEN  = new Set(LS.get("gdd_seen",  []));
let HIDDEN= new Set(LS.get("gdd_hidden",[]));
let SAVED = new Set(LS.get("gdd_saved", []));
let KNOWN = new Set(LS.get("gdd_known", []));   // ids seen on a previous load → for NEW badge
let BOUGHT= LS.get("gdd_bought", {});           // id -> {seller, karat, price, ts, title}
let LASTSEEN = LS.get("gdd_lastseen", {});      // id -> {snap, absent} : last time each deal was live in the feed
let ENDED    = LS.get("gdd_ended", {});         // id -> {snap, endedTs} : dropped out of feed (sold/ended), kept 7d
let NEW   = new Set();
// sellers you've successfully bought from → trusted (strongest single signal)
function trustedSellers(){
  const c={}; Object.values(BOUGHT).forEach(b=>{ if(b.seller) c[b.seller]=(c[b.seller]||0)+1; });
  return c;
}
const persist = ()=>{ LS.set("gdd_seen",[...SEEN]); LS.set("gdd_hidden",[...HIDDEN]);
  LS.set("gdd_saved",[...SAVED]); LS.set("gdd_known",[...KNOWN]); LS.set("gdd_bought",BOUGHT);
  LS.set("gdd_lastseen",LASTSEEN); LS.set("gdd_ended",ENDED); };

const ui = LS.get("gdd_ui",{})||{};
const F = Object.assign({karat:"All",minScore:0,minProfit:0,showTraps:false,
  hideSeen:false,showHidden:false,settingsOpen:false,
  sortBy:"score",   // "score" | "profit" | "age" | "pricedrop"
  showTrends:true, showPrices:true, showEnded:false}, ui.F||{});
const saveUI = ()=>{ ui.F=F; LS.set("gdd_ui",ui); };

const SAMPLE = {
  updated:new Date().toISOString(), spot_per_oz:4118.9, _sample:true,
  prices_per_gram:{ "10K":55.06,"14K":77.13,"18K":99.23,"22K":121.27,"24K":132.29 },
  payout_pct:1.00, traps_count:1, total_profit:1521,
  settings_used:{queries:["14k gold scrap grams"]},
  deals:[
    {id:"s1",score:84,under_pct:42.1,karat:"14K",grams:31.4,price:1390,ship:0,all_in_per_g:44.27,page_per_g:77.13,profit:1032,offer:true,seller_pct:99.6,seller_user:"goldvault_miami",seller_score:4210,photos:8,verify:true,gold_wt:true,prev_price:1490,listed:new Date(Date.now()-2*86400000).toISOString(),deal_why:"seller stated gold weight separately, hallmark/tested language in title, established seller (4k sales)",title:"14K Solid Gold Rope Chain Scrap Lot 31.4 grams"},
    {id:"s2",score:61,under_pct:30.5,karat:"10K",grams:50.0,price:1800,ship:8,all_in_per_g:36.16,page_per_g:55.06,profit:489,offer:false,seller_pct:98.1,seller_user:"estate_finds_fl",seller_score:142,photos:3,verify:true,mixed_lot:true,listed:new Date(Date.now()-8*86400000).toISOString(),prev_price:null,mixed_note:"mixed lot (10k+14k) — priced at 10k floor since the listing doesn't break down weight by grade; real value is higher only if most of it is the higher karat — check the breakdown",deal_why:"believable margin, not too-good",title:"Mixed Lot 14k and 10k Gold Scrap 50 grams"},
    {id:"s3",score:38,under_pct:22.0,karat:"14K",grams:11.2,price:620,ship:5,all_in_per_g:60.16,page_per_g:77.13,profit:185,offer:false,seller_pct:100,seller_user:"jdoe_estate",seller_score:12,photos:1,listed:new Date(Date.now()-45*86400000).toISOString(),prev_price:680,deal_why:"99%+ feedback, believable margin, not too-good",title:"14k gold pendant estate find 11.2g"},
  ],
  traps:[{id:"t1",score:100,under_pct:74,karat:"24K",grams:1,price:30,ship:4,all_in_per_g:34,page_per_g:132,profit:98,seller_pct:90,seller_score:5,photos:1,title:"24K Gold Bar 1g (too good to be true)",trap:true,trap_reason:"24k bar/bullion priced under melt — almost always counterfeit or plated"}]
};
const SAMPLE_HIST = Array.from({length:24},(_,i)=>({
  t:new Date(Date.now()-(23-i)*1800000).toISOString(),
  spot_oz:4060+Math.round(Math.sin(i/3)*40+i*2),
  deals:3+Math.round(Math.abs(Math.sin(i/2))*6),
  avg_under:24+Math.round(Math.abs(Math.cos(i/2))*10)
}));

let DATA=null, HIST=[], SET=null, TRUSTED={};

function scoreStyle(s){
  if(s>=75) return {c:"#34d399",l:"Excellent"};
  if(s>=50) return {c:"#a3e635",l:"Strong"};
  if(s>=25) return {c:"#fbbf24",l:"Fair"};
  return {c:"#a3a3a3",l:"Slim"};
}
function lineChart(hist, key, color, fmt_fn){
  const pts=hist.map(h=>h[key]).filter(Number.isFinite);
  if(!pts.length) return '<div class="now" style="color:#525252">no history yet</div>';
  const W=340,H=90,PL=44,PR=8,PT=8,PB=20;
  const min=Math.min(...pts),max=Math.max(...pts),span=(max-min)||1;
  const cx=i=>PL+(i/(pts.length-1||1))*(W-PL-PR);
  const cy=v=>PT+(1-(v-min)/span)*(H-PT-PB);
  const pathD=pts.map((v,i)=>(i?'L':'M')+cx(i).toFixed(1)+' '+cy(v).toFixed(1)).join(' ');
  const areaD=pathD+` L ${cx(pts.length-1).toFixed(1)} ${H-PB} L ${cx(0).toFixed(1)} ${H-PB} Z`;
  // y axis labels: min and max
  const yLabels=[
    {y:cy(max),label:fmt_fn(max)},
    {y:cy(min),label:fmt_fn(min)},
  ];
  // x axis: first and last timestamps
  const ts=hist.map(h=>h.t).filter(Boolean);
  const xLabels=ts.length>=2?[
    {x:cx(0),label:new Date(ts[0]).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})},
    {x:cx(pts.length-1),label:new Date(ts[ts.length-1]).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})},
  ]:[];
  // invisible hit targets for hover
  const hits=pts.map((v,i)=>{
    const ts_str=hist[i]&&hist[i].t?new Date(hist[i].t).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    const src_str=hist[i]&&hist[i].price_src?hist[i].price_src:'';
    return `<circle class="hit" cx="${cx(i).toFixed(1)}" cy="${cy(v).toFixed(1)}" r="14" fill="transparent"
      data-val="${fmt_fn(v)}" data-ts="${ts_str}" data-src="${src_str}" data-cx="${cx(i).toFixed(1)}" data-cy="${cy(v).toFixed(1)}"/>`;
  }).join('');
  const id='ch'+Math.random().toString(36).slice(2,7);
  return `<div class="chrt" id="${id}">
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;overflow:visible" onmouseleave="chartOut('${id}')">
      <path d="${areaD}" fill="${color}" opacity="0.08"/>
      <path d="${pathD}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
      ${yLabels.map(l=>`<text x="${PL-4}" y="${l.y+4}" fill="#525252" font-size="8" text-anchor="end" font-family="monospace">${l.label}</text>`).join('')}
      ${xLabels.map(l=>`<text x="${l.x}" y="${H}" fill="#525252" font-size="8" text-anchor="middle" font-family="monospace">${l.label}</text>`).join('')}
      <circle cx="${cx(pts.length-1).toFixed(1)}" cy="${cy(pts[pts.length-1]).toFixed(1)}" r="3" fill="${color}"/>
      <line id="${id}-vx" x1="0" y1="${PT}" x2="0" y2="${H-PB}" stroke="${color}" stroke-width="1" opacity="0.3" visibility="hidden"/>
      <circle id="${id}-dot" cx="0" cy="0" r="4" fill="${color}" visibility="hidden"/>
      ${hits}
      <rect id="${id}-tip" x="0" y="0" width="1" height="1" rx="3" fill="#1a1a1a" stroke="#333" visibility="hidden"/>
      <text id="${id}-tv" x="0" y="0" fill="#fafafa" font-size="9" font-family="monospace" font-weight="600" visibility="hidden"></text>
      <text id="${id}-tt" x="0" y="0" fill="#737373" font-size="8" font-family="monospace" visibility="hidden"></text>
      <text id="${id}-ts2" x="0" y="0" fill="#525252" font-size="7.5" font-family="monospace" font-style="italic" visibility="hidden"></text>
    </svg></div>`;
}
function chartOut(id){
  ['vx','dot','tip','tv','tt','ts2'].forEach(s=>{
    const e=document.getElementById(id+'-'+s); if(e) e.setAttribute('visibility','hidden');
  });
}
function chartHover(el){
  const svg=el.closest('svg'), id=svg.parentElement.id;
  const cx=parseFloat(el.getAttribute('data-cx')), cy=parseFloat(el.getAttribute('data-cy'));
  const val=el.getAttribute('data-val'), ts=el.getAttribute('data-ts'), src=el.getAttribute('data-src')||'';
  const vb=svg.getAttribute('viewBox').split(' ').map(Number), W=vb[2],H=vb[3];
  const PB=20,PT=8;
  const vx=document.getElementById(id+'-vx');
  if(vx){vx.setAttribute('x1',cx);vx.setAttribute('x2',cx);vx.setAttribute('visibility','visible');}
  const dot=document.getElementById(id+'-dot');
  if(dot){dot.setAttribute('cx',cx);dot.setAttribute('cy',cy);dot.setAttribute('visibility','visible');}
  // position tooltip: 3 lines if src present, 2 lines otherwise
  const hasSrc=src.length>0;
  const tw=Math.max(val.length,ts.length,(hasSrc?src.length+4:0))*5.5+12, th=hasSrc?40:28;
  let tx=cx+6; if(tx+tw>W-4) tx=cx-tw-6;
  const ty=Math.max(PT,cy-th/2);
  const tip=document.getElementById(id+'-tip');
  if(tip){tip.setAttribute('x',tx);tip.setAttribute('y',ty);tip.setAttribute('width',tw);tip.setAttribute('height',th);tip.setAttribute('visibility','visible');}
  const tv=document.getElementById(id+'-tv');
  if(tv){tv.setAttribute('x',tx+6);tv.setAttribute('y',ty+11);tv.setAttribute('visibility','visible');tv.textContent=val;}
  const tt=document.getElementById(id+'-tt');
  if(tt){tt.setAttribute('x',tx+6);tt.setAttribute('y',ty+22);tt.setAttribute('visibility','visible');tt.textContent=ts;}
  const ts2=document.getElementById(id+'-ts2');
  if(ts2){ts2.setAttribute('x',tx+6);ts2.setAttribute('y',ty+33);ts2.setAttribute('visibility',hasSrc?'visible':'hidden');ts2.textContent=hasSrc?'via '+src:'';}
}
function barChart(counts){
  const W=300,H=90,PB=20,PT=8,g=8;
  const n=KARATS.length,bw=(W-g*(n+1))/n,max=Math.max(1,...KARATS.map(k=>counts[k]||0));
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">`+KARATS.map((k,i)=>{
    const v=counts[k]||0,barH=(v/max)*(H-PT-PB),x=g+i*(bw+g),y=H-PB-barH;
    return `<rect x="${x}" y="${Math.max(y,PT)}" width="${bw}" height="${Math.max(barH,1)}" rx="2" fill="#fbbf24" opacity="${v?0.85:0.15}"/>
      <text x="${x+bw/2}" y="${H-4}" fill="#525252" font-size="8" text-anchor="middle" font-family="monospace">${k}</text>
      ${v?`<text x="${x+bw/2}" y="${Math.max(y,PT)-3}" fill="#a3a3a3" font-size="8" text-anchor="middle" font-family="monospace">${v}</text>`:''}`;
  }).join('')+`</svg>`;
}
function listingAge(listed){
  if(!listed) return null;
  const d=new Date(listed); if(isNaN(d)) return null;
  const days=Math.floor((Date.now()-d)/86400000);
  if(days===0) return "today";
  if(days===1) return "1d old";
  if(days<7) return days+"d old";
  if(days<30) return Math.floor(days/7)+"w old";
  return Math.floor(days/30)+"mo old";
}
function nextRun(){
  // derive from the actual last run timestamp so the countdown never desyncs
  // from the real schedule, regardless of what cron interval is set
  if(!DATA||!DATA.updated) return null;
  const last=new Date(DATA.updated);
  if(isNaN(last)) return null;
  const interval=30; // minutes between scheduled runs (matches scout.yml cron + external pinger)
  const next=new Date(last.getTime()+interval*60000);
  return next > new Date() ? next : new Date(new Date().getTime()+interval*60000);
}
function lastRunStr(){
  if(!DATA||!DATA.updated) return "never";
  const last=new Date(DATA.updated); if(isNaN(last)) return "unknown";
  const mins=Math.floor((Date.now()-last)/60000);
  const ago = mins<1?"just now" : mins<60?`${mins}m ago` : mins<1440?`${Math.floor(mins/60)}h ${mins%60}m ago` : `${Math.floor(mins/1440)}d ago`;
  return `${last.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${ago}`;
}
function countdownStr(){ const t=nextRun(); if(!t) return "—";
  let s=Math.max(0,Math.round((t-new Date())/1000)); const m=Math.floor(s/60); s=s%60;
  return `~${m}m ${String(s).padStart(2,"0")}s`; }

// ---- recently ended (sold) tracking ----
const ENDED_TTL_DAYS = 7;
const ABSENT_RUNS_TO_END = 2;   // must vanish for 2 consecutive HEALTHY loads before we retire it
function endedAge(ts){
  const mins=Math.floor((Date.now()-ts)/60000);
  if(mins<60) return mins<1?"just now":`${mins}m ago`;
  const hrs=Math.floor(mins/60); if(hrs<24) return `${hrs}h ago`;
  const days=Math.floor(hrs/24); return days===1?"1d ago":`${days}d ago`;
}
function reconcileEnded(){
  // 1) purge expired ended entries no matter what
  const cutoff=Date.now()-ENDED_TTL_DAYS*86400000;
  for(const id in ENDED){ if(ENDED[id].endedTs<cutoff) delete ENDED[id]; }

  // 2) never diff against sample/blank data — that path would retire the whole board
  const healthy = DATA && !DATA._sample && Array.isArray(DATA.deals);
  if(!healthy){ persist(); return; }

  const snapOf = x => ({id:x.id,title:x.title,karat:x.karat,grams:x.grams,price:x.price,
    ship:x.ship,profit:x.profit,under_pct:x.under_pct,all_in_per_g:x.all_in_per_g,
    url:x.url,seller_user:x.seller_user||"",score:x.score});

  const live=new Set(DATA.deals.map(x=>x.id).filter(Boolean));
  // guard against a truncated/partial sweep wrongly retiring everything at once
  const prevLive=Object.values(LASTSEEN).filter(r=>(r.absent||0)===0).length;
  const collapsed = prevLive>=8 && live.size < prevLive*0.5;

  // refresh snapshots for everything currently live; a deal that reappears un-ends
  DATA.deals.forEach(x=>{ if(!x.id) return; LASTSEEN[x.id]={snap:snapOf(x),absent:0}; if(ENDED[x.id]) delete ENDED[x.id]; });

  // count absences for tracked ids no longer live; retire after N consecutive healthy misses
  if(!collapsed){
    for(const id in LASTSEEN){
      if(live.has(id)) continue;
      const rec=LASTSEEN[id];
      rec.absent=(rec.absent||0)+1;
      if(rec.absent>=ABSENT_RUNS_TO_END){
        if(!ENDED[id] && !BOUGHT[id]) ENDED[id]={snap:rec.snap,endedTs:Date.now()};
        delete LASTSEEN[id];   // stop tracking once retired (or already logged as bought)
      }
    }
  }
  persist();
}

async function load(){
  try{ const r=await fetch("results.json",{cache:"no-store"}); if(!r.ok) throw 0; DATA=await r.json(); }
  catch(e){ DATA=SAMPLE; }
  try{ const h=await fetch("history.json",{cache:"no-store"}); HIST=h.ok?await h.json():(DATA._sample?SAMPLE_HIST:[]); }
  catch(e){ HIST=DATA._sample?SAMPLE_HIST:[]; }
  try{ const s=await fetch("settings.json",{cache:"no-store"}); SET=s.ok?await s.json():null; }
  catch(e){ SET=null; }
  if(!SET) SET={payout_pct:DATA.payout_pct||1,trap_under_pct:0.5,max_price:2000,min_feedback_pct:96,alert_min_score:70,extra_exclude:[],queries:(DATA.settings_used&&DATA.settings_used.queries)||[]};

  // NEW = current ids not seen on a previous load; then fold them into KNOWN
  const allIds=[...(DATA.deals||[]),...(DATA.traps||[])].map(x=>x.id).filter(Boolean);
  NEW=new Set(allIds.filter(id=>!KNOWN.has(id)));
  allIds.forEach(id=>KNOWN.add(id));
  reconcileEnded();
  persist();
  render();
}

function render(){
  const d=DATA, app=document.getElementById("app");
  TRUSTED=trustedSellers();
  const trapList=(d.traps||[]).map(t=>Object.assign({trap:true},t));
  const pool=(F.showTraps ? d.deals.concat(trapList) : d.deals.slice());

  // effective score = melt score + small bump for sellers you've bought from before
  const eff=x=>x.score + (x.seller_user&&TRUSTED[x.seller_user] ? 8 : 0);

  let list=pool
    .filter(x=>!HIDDEN.has(x.id) || F.showHidden)
    .filter(x=>F.karat==="All"||x.karat===F.karat)
    .filter(x=>x.score>=F.minScore)
    .filter(x=>(x.profit||0)>=F.minProfit);
  if(F.hideSeen) list=list.filter(x=>!SEEN.has(x.id)||SAVED.has(x.id));

  // order: saved first, then unseen, then seen; each block ranked by effective score
  const rank=x=>(SAVED.has(x.id)?0:SEEN.has(x.id)?2:1);
  const sortVal=x=>{
    if(F.sortBy==='profit') return x.profit||0;
    if(F.sortBy==='age') return x.listed ? new Date(x.listed).getTime() : 0; // newest listed first
    if(F.sortBy==='pricedrop') return x.prev_price&&x.prev_price>x.price ? x.prev_price-x.price : 0;
    return eff(x); // default: score
  };
  list.sort((a,b)=> rank(a)-rank(b) || sortVal(b)-sortVal(a));

  const saved=list.filter(x=>SAVED.has(x.id));
  const rest =list.filter(x=>!SAVED.has(x.id));

  const byKarat={}; d.deals.forEach(x=>byKarat[x.karat]=(byKarat[x.karat]||0)+1);
  const totalProfit=d.total_profit!=null?d.total_profit:d.deals.reduce((s,x)=>s+(x.profit>0?x.profit:0),0);
  const boughtCount=Object.keys(BOUGHT).length;
  // margin mirror: actual net where you've entered it, estimate otherwise
  const bvals=Object.values(BOUGHT);
  const bProfit=bvals.reduce((s,b)=>s+(b.actual_profit!=null?b.actual_profit:(b.est_profit||0)),0);
  const bCost=bvals.reduce((s,b)=>s+(b.cost||0),0);
  const bMargin=bCost>0?(bProfit/bCost*100):0;
  const bActualN=bvals.filter(b=>b.actual_profit!=null).length;
  const avgUnder=d.deals.length?(d.deals.reduce((s,x)=>s+x.under_pct,0)/d.deals.length).toFixed(0):0;
  const newCount=d.deals.filter(x=>NEW.has(x.id)).length;
  // staleness: results.updated older than ~3h means the scanner may have stalled
  const ageMin=(Date.now()-new Date(d.updated).getTime())/60000;
  const stale=!d._sample && ageMin>180;

  // heartbeat: derived from the last successful sweep (results.json.updated) —
  // the same "time since last good run" signal healthchecks.io watches
  const hbMin=Math.round(ageMin);
  const hbAgo = hbMin<1?"just now":hbMin<60?`${hbMin}m ago`:`${Math.floor(hbMin/60)}h ${hbMin%60}m ago`;
  const hb = d._sample ? {c:"#737373",l:"no live data"}
    : ageMin<45  ? {c:"#34d399",l:"healthy"}
    : ageMin<180 ? {c:"#fcd34d",l:"late"}
    :              {c:"#fb7185",l:"down"};

  // recently ended (sold) pile — most recently gone first
  const endedArr=Object.entries(ENDED).map(([id,r])=>({...r.snap,_endedTs:r.endedTs}))
                 .sort((a,b)=>b._endedTs-a._endedTs);
  const ENDED_SHOW=40;

  app.innerHTML=`
    <header>
      <div><h1><span class="dot"></span>GOLD DEAL DESK</h1>
        <div class="sub">Solid US gold · your filters · under today's price</div></div>
      <div style="text-align:right">
        <button class="btn sm" onclick="runNow()" style="margin-bottom:6px">⚡ run now</button>
        <button class="hbtn" onclick="load()">↻ refresh</button>
        <div class="lastrun">last run: <span id="lr">${lastRunStr()}</span></div>
        <div class="next">next ~<span id="cd">${countdownStr()}</span></div>
        <div class="next" style="margin-top:2px" title="Derived from the last successful sweep — the same signal healthchecks.io watches. Green under 45m, amber under 3h, red beyond.">heartbeat <span style="color:${hb.c}">●</span> <span style="color:${hb.c}">${hb.l}</span>${d._sample?"":` · ${hbAgo}`}</div>
        <div id="runmsg" class="note" style="text-align:right"></div></div>
    </header>

    ${stale?`<div class="empty" style="margin-bottom:16px;border-color:rgba(244,63,94,.4);color:#fb7185;font-size:12px;padding:12px">⚠ Data is ${Math.round(ageMin/60)}h old — the scanner may have stalled. Hit ⚡ run now, or check the Actions log.</div>`:""}

    <section><div class="stats">
      <div class="stat"><div class="v grn">${d.deals.length}</div><div class="k">live deals</div></div>
      <div class="stat"><div class="v amb">${newCount}</div><div class="k">new since last visit</div></div>
      <div class="stat" title="${bActualN} of ${boughtCount} with actual profit entered; rest estimated">
        <div class="v" style="color:#c4b5fd">${boughtCount?(bMargin>0?"+":"")+bMargin.toFixed(0)+"%":boughtCount}</div>
        <div class="k">${boughtCount?`margin · ${boughtCount} buys`:"bought (logged)"}</div></div>
      <div class="stat"><div class="v">${avgUnder}%</div><div class="k">avg under price</div></div>
    </div></section>

    <section>
      <div class="sec-hdr" onclick="setF('showTrends',!F.showTrends)">
        <div class="label">Trends · last ${HIST.length||0} runs</div>
        <span class="sec-toggle">${F.showTrends?"▲ collapse":"▼ expand"}</span>
      </div>
      ${F.showTrends?`<div class="charts">
        <div class="card"><h3>Gold price ($/oz)</h3>${lineChart(HIST,'spot_oz',"#fcd34d",v=>'$'+Math.round(v).toLocaleString())}<div class="now">${fmt(d.spot_per_oz)}/oz</div></div>
        <div class="card"><h3>Deals per run</h3>${lineChart(HIST,'deals',"#34d399",v=>v+' deals')}<div class="now">${d.deals.length} now</div></div>
        <div class="card"><h3>Avg discount</h3>${lineChart(HIST,'avg_under',"#60a5fa",v=>v+'%')}<div class="now">${avgUnder}% now</div></div>
        <div class="card"><h3>Live deals by karat</h3>${barChart(byKarat)}<div class="now">${d.deals.length} total</div></div>
      </div>`:""}
    </section>

    <section>
      <div class="sec-hdr" onclick="setF('showPrices',!F.showPrices)">
        <div class="label">Today's gold price per gram</div>
        <div style="display:flex;gap:12px;align-items:center">
          <span class="mono" style="font-size:11px;color:#737373">${new Date(d.updated).toLocaleString()}</span>
          <span class="sec-toggle">${F.showPrices?"▲":"▼"}</span>
        </div>
      </div>
      ${F.showPrices?`<div class="prices">${KARATS.map(k=>`<div class="price"><div class="pk">${k}</div><div class="pv">${fmt(d.prices_per_gram[k])}</div></div>`).join("")}</div>`:""}
    </section>

    <section class="panel"><div class="row" style="margin-bottom:10px">
      <div class="ctl" style="flex:1;min-width:180px"><span>Min score ${F.minScore}</span>
        <input type="range" min="0" max="100" value="${F.minScore}" oninput="setF('minScore',+this.value)"></div>
      <div class="ctl"><span>Min profit $</span>
        <input type="number" min="0" step="10" value="${F.minProfit}" oninput="setF('minProfit',+this.value||0)"></div>
    </div>
    <div class="row" style="margin-bottom:10px">
      <span class="label">Karat</span>
      ${["All",...KARATS].map(k=>`<button class="chip ${F.karat===k?"on":""}" onclick="setF('karat','${k}')">${k}</button>`).join("")}
    </div>
    <div class="row" style="margin-bottom:10px">
      <span class="label">Sort</span>
      ${[["score","Best score"],["profit","Most profit"],["age","Newest listing"],["pricedrop","Price dropped"]].map(([v,l])=>
        `<button class="chip ${F.sortBy===v?"on":""}" onclick="setF('sortBy','${v}')">${l}</button>`).join("")}
    </div>
    <div class="row">
      <label class="toggle"><input type="checkbox" ${F.showTraps?"checked":""} onchange="setF('showTraps',this.checked)"> show traps</label>
      <label class="toggle"><input type="checkbox" ${F.hideSeen?"checked":""} onchange="setF('hideSeen',this.checked)"> hide seen</label>
      <label class="toggle"><input type="checkbox" ${F.showHidden?"checked":""} onchange="setF('showHidden',this.checked)"> show hidden</label>
      <button class="btn ghost sm" onclick="clearSet('seen')">clear seen (${SEEN.size})</button>
      <button class="btn ghost sm" onclick="clearSet('hidden')">clear hidden (${HIDDEN.size})</button>
      <button class="btn ghost" style="margin-left:auto" onclick="setF('settingsOpen',!F.settingsOpen)">${F.settingsOpen?"▲ engine settings":"▼ engine settings"}</button>
    </div></section>

    <section class="panel ${F.settingsOpen?"":"hidden"}" id="settings">
      <div class="label" style="margin-bottom:10px">Engine settings · these change what the NEXT run does</div>
      <div class="row" style="margin-bottom:12px">
        <div class="ctl"><span>Buyer payout %</span><input id="s_payout" type="number" step="1" value="${Math.round((SET.payout_pct||1)*100)}"></div>
        <div class="ctl"><span>Trap threshold %</span><input id="s_trap" type="number" step="1" value="${Math.round((SET.trap_under_pct||.5)*100)}"></div>
        <div class="ctl"><span>Max price $</span><input id="s_maxprice" type="number" step="50" value="${SET.max_price||2000}"></div>
        <div class="ctl"><span>Min seller %</span><input id="s_seller" type="number" step="1" value="${SET.min_feedback_pct||96}"></div>
        <div class="ctl"><span>Alert at score</span><input id="s_alert" type="number" step="1" value="${SET.alert_min_score||70}"></div>
      </div>
      <div class="ctl" style="margin-bottom:12px"><span>Search terms — one per line</span>
        <textarea id="s_queries">${(SET.queries||[]).join("\n")}</textarea></div>
      <div class="ctl" style="margin-bottom:12px"><span>Extra words to always exclude — comma separated</span>
        <textarea id="s_exclude" style="min-height:50px">${(SET.extra_exclude||[]).join(", ")}</textarea></div>
      <div class="row" style="margin-bottom:8px">
        <button class="btn" onclick="saveSettings()">Save</button>
        <button class="btn ghost" onclick="copySettings()">Copy JSON</button>
        <span id="savemsg" class="note"></span>
      </div>
      <details><summary class="note" style="cursor:pointer">One-tap auto-save setup (optional GitHub token)</summary>
        <div style="margin-top:8px">
          <div class="ctl" style="margin-bottom:6px"><span>GitHub token (public_repo scope)</span>
            <input id="s_token" type="password" placeholder="ghp_..." value="${localStorage.getItem('gdd_token')||''}"></div>
          <button class="btn ghost" onclick="saveToken()">Remember token on this device</button>
          <p class="warn" style="margin-top:8px">Write key — treat like a password, stored only in this browser, revoke anytime at github.com/settings/tokens. Without it, use Copy JSON and paste into settings.json.</p>
        </div></details>
    </section>

    ${d._sample?`<div class="empty" style="margin-bottom:12px;border-color:rgba(180,120,10,.4);color:#fcd34d;font-size:11px;padding:10px">Showing sample data until the scout writes results.json.</div>`:""}
    ${d.traps_count>0&&!F.showTraps?`<div class="traps">⚠ ${d.traps_count} likely trap(s) hidden — flip "show traps" to inspect</div>`:""}

    <section>
      <div class="head-row"><div class="label">${rest.length+saved.length} listing(s)</div>
        ${boughtCount?`<button class="btn ghost sm" onclick="clearBought()">clear bought log (${boughtCount})</button>`:`<div class="label" style="color:#525252">$ = bought · ★ saved · ✕ hide</div>`}</div>
      ${saved.length?`<div class="pilehdr">★ Saved (${saved.length})</div>`+saved.map(dealRow).join(""):""}
      ${saved.length&&rest.length?`<div class="pilehdr" style="color:#a3a3a3">All listings</div>`:""}
      ${rest.length===0&&saved.length===0?`<div class="empty">Nothing matches these filters right now.</div>`:rest.map(dealRow).join("")}
    </section>

    ${endedArr.length?`
    <section>
      <div class="sec-hdr" onclick="setF('showEnded',!F.showEnded)">
        <div class="label">Recently sold / ended · last ${ENDED_TTL_DAYS}d (${endedArr.length})</div>
        <span class="sec-toggle">${F.showEnded?"▲ collapse":"▼ expand"}</span>
      </div>
      ${F.showEnded?`
        <div class="note" style="margin:2px 0 8px;color:#737373">Listings that dropped out of the live feed — likely sold or ended (a listing can also just be pulled by the seller, so read it as directional). Log the ones you actually bought before they age out; the rest are a gauge of what's moving.</div>
        ${endedArr.slice(0,ENDED_SHOW).map(endedRow).join("")}
        ${endedArr.length>ENDED_SHOW?`<div class="note" style="color:#525252;margin-top:6px">+${endedArr.length-ENDED_SHOW} older not shown</div>`:""}
      `:""}
    </section>`:""}

    <div class="foot">⚡ run now triggers an immediate sweep (≈2 min, then refresh). Click a listing to open it (marks it seen). $ logs it as bought — sellers you've bought from get a ★ trusted badge and a ranking bump on future listings. When you log a buy it asks for the actual net (blank uses the melt estimate), and the "margin" tile mirrors that back so you can see whether the tool's deals turn into real money. ★ saves to the top pile, ✕ hides for good. When a listing drops out of the feed it moves to <b>Recently sold / ended</b> for ${ENDED_TTL_DAYS} days — log any you actually bought before they age out, or just watch what's selling. ${boughtCount<15?`Pattern-learning beyond trusted-sellers needs ~15+ logged buys to mean anything (you have ${boughtCount}); keep logging and it gets smarter.`:''} All triage is stored on this device. Stated weight and photos still need your eye before bidding.</div>`;
}

function dealRow(x){
  const st=scoreStyle(x.score), isNew=NEW.has(x.id), seen=SEEN.has(x.id), saved=SAVED.has(x.id);
  const bought=!!BOUGHT[x.id];
  const trusted=x.seller_user && TRUSTED[x.seller_user];
  const cls=["deal"]; if(x.trap)cls.push("trap"); if(seen&&!saved&&!bought)cls.push("seen");
  if(saved)cls.push("saved"); if(bought)cls.push("bought");
  const tags=[
    isNew?'<span class="tag n">new</span>':'',
    trusted?`<span class="tag tr">★ trusted seller (${TRUSTED[x.seller_user]})</span>`:'',
    x.trap?'<span class="tag t">trap</span>':'',
    x.verify?'<span class="tag v">verify wt</span>':'',
    x.mixed_lot?'<span class="tag m">mixed lot</span>':'',
    x.gold_wt?'<span class="tag g">gold wt</span>':'',
    x.offer?'<span class="tag">offer</span>':'',
  ].join("");
  return `<div class="${cls.join(" ")}" id="row-${x.id}">
    <a class="link" href="${x.url}" target="_blank" rel="noopener" onclick="markSeen('${x.id}')">
      <div class="score" style="box-shadow:inset 0 0 0 1px ${st.c}55">
        <span class="n" style="color:${st.c}">${x.score}</span><span class="l">${st.l}</span></div>
      <div style="min-width:0;flex:1">
        <div class="title">${x.title} ${tags}</div>
        <div class="meta">
          <span class="wht">${x.karat} · ${x.grams}g</span>
          <span>${fmt(x.price)}${x.ship?` +${fmt(x.ship)} ship`:""}</span>
          <span class="grn">↓ ${x.under_pct}% · ${fmt(x.all_in_per_g)}/g</span>
          <span class="${x.profit>0?"grn":"red"}">profit ${fmt(x.profit)}</span>
          ${x.seller_pct?`<span>seller ${x.seller_pct}%${x.seller_score!=null?` · ${x.seller_score>=1000?(x.seller_score/1000).toFixed(0)+"k":x.seller_score} sales`:""}</span>`:""}
          ${x.photos!=null?`<span>${x.photos} photo${x.photos===1?"":"s"}</span>`:""}
          ${x.listed?`<span class="age">${listingAge(x.listed)||""}</span>`:""}
          ${x.prev_price&&x.prev_price>x.price?`<span class="price-drop">↓ was ${fmt(x.prev_price)}</span>`:""}
          ${x.prev_price&&x.prev_price<x.price?`<span class="price-rise">↑ was ${fmt(x.prev_price)}</span>`:""}
        </div>
        ${x.trap&&x.trap_reason?`<div class="reason">⚠ ${x.trap_reason}</div>`:""}
        ${!x.trap&&x.mixed_note?`<div class="mixed">◆ ${x.mixed_note}</div>`:""}
        ${!x.trap&&x.deal_why?`<div class="why">✓ ${x.deal_why}</div>`:""}
        </div></a>
    <div class="acts">
      <button class="iact ${bought?"on":""}" title="${bought?'bought ✓':'mark as bought'}" onclick="markBought('${x.id}')">$</button>
      <button class="iact ${saved?"on":""}" title="save" onclick="toggleSet('saved','${x.id}')">★</button>
      <button class="iact" title="hide" onclick="toggleSet('hidden','${x.id}')">✕</button>
      <button class="copy-btn" title="copy link" onclick="copyLink('${x.url}',event)">⎘</button>
    </div></div>`;
}

function endedRow(x){
  const st=scoreStyle(x.score);
  return `<div class="deal seen" id="end-${x.id}">
    <a class="link" href="${x.url}" target="_blank" rel="noopener">
      <div class="score" style="box-shadow:inset 0 0 0 1px ${st.c}55">
        <span class="n" style="color:${st.c}">${x.score}</span><span class="l">${st.l}</span></div>
      <div style="min-width:0;flex:1">
        <div class="title">${x.title} <span class="tag">ended ${endedAge(x._endedTs)}</span>${SAVED.has(x.id)?' <span class="tag tr">★ was saved</span>':''}</div>
        <div class="meta">
          <span class="wht">${x.karat} · ${x.grams}g</span>
          <span>${fmt(x.price)}${x.ship?` +${fmt(x.ship)} ship`:""}</span>
          <span class="grn">↓ ${x.under_pct}% · ${fmt(x.all_in_per_g)}/g</span>
          <span class="${x.profit>0?"grn":"red"}">profit ${fmt(x.profit)}</span>
        </div>
      </div></a>
    <div class="acts">
      <button class="iact" title="I bought this — log it" onclick="markBoughtEnded('${x.id}')">$</button>
      <button class="iact" title="dismiss" onclick="dismissEnded('${x.id}')">✕</button>
    </div></div>`;
}

function markSeen(id){ SEEN.add(id); persist(); /* no re-render: let the click open the tab */ }
function logBuy(x){
  const cost=(x.price||0)+(x.ship||0), est=x.profit||0;
  const ans=prompt(`Logged as bought.\n\nActual net profit on this one once you flip it?\nLeave blank to use the estimate ($${est.toFixed(0)}).`,"");
  const actual=(ans!==null&&ans.trim()!=="")?parseFloat(ans.replace(/[^0-9.\-]/g,"")):null;
  BOUGHT[x.id]={seller:x.seller_user||"",karat:x.karat,price:x.price,grams:x.grams,
                cost:cost, est_profit:est, actual_profit:isFinite(actual)?actual:null,
                ts:Date.now(),title:x.title};
}
function markBought(id){
  if(BOUGHT[id]){ delete BOUGHT[id]; }
  else{
    const x=[...(DATA.deals||[]),...(DATA.traps||[])].find(d=>d.id===id);
    if(x){ logBuy(x); SEEN.add(id); }
  }
  persist(); render();
}
function markBoughtEnded(id){
  const rec=ENDED[id]; if(!rec) return;
  logBuy(rec.snap);            // snap carries id,title,karat,price,ship,profit,seller_user
  delete ENDED[id];
  persist(); render();
}
function dismissEnded(id){ delete ENDED[id]; persist(); render(); }
function toggleSet(which,id){
  const set = which==="saved"?SAVED:HIDDEN;
  set.has(id)?set.delete(id):set.add(id);
  if(which==="hidden" && HIDDEN.has(id)) SAVED.delete(id);
  persist(); render();
}
function clearSet(which){ (which==="seen"?SEEN:HIDDEN).clear(); persist(); render(); }
function clearBought(){ if(confirm("Clear your entire bought log? This removes the trusted-seller history.")){ BOUGHT={}; persist(); render(); } }
function copyLink(url,e){ e.stopPropagation(); e.preventDefault();
  navigator.clipboard.writeText(url).then(()=>{
    const b=e.target; const orig=b.textContent; b.textContent='✓'; b.style.color='#34d399';
    setTimeout(()=>{b.textContent=orig;b.style.color='';},1200);
  }).catch(()=>{ window.prompt('Copy this link:',url); });
}
function setF(k,v){ F[k]=v; saveUI(); render(); }

function rmsg(t,c){ const e=document.getElementById("runmsg"); if(e){e.textContent=t; e.style.color=c||"#737373";} }
async function runNow(){
  const owner=location.hostname.split(".")[0], repo=location.pathname.split("/").filter(Boolean)[0];
  const token=localStorage.getItem("gdd_token");
  if(!token){
    // no token: open the Actions "Run workflow" page (one click there)
    window.open(`https://github.com/${owner}/${repo}/actions/workflows/scout.yml`,"_blank","noopener");
    rmsg("opened Actions — click Run workflow there","#fcd34d"); return;
  }
  const api=`https://api.github.com/repos/${owner}/${repo}/actions/workflows/scout.yml/dispatches`;
  rmsg("starting a run…");
  try{
    const r=await fetch(api,{method:"POST",
      headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"},
      body:JSON.stringify({ref:"main"})});
    if(r.status===204) rmsg("run started — takes ~2 min, then refresh","#34d399");
    else rmsg("couldn't start ("+r.status+"); token needs workflow scope","#fb7185");
  }catch(e){ rmsg("run trigger failed; open Actions manually","#fb7185"); }
}

function rmsgSettings(){}
function gatherSettings(){
  const lines=document.getElementById("s_queries").value.split("\n").map(s=>s.trim()).filter(Boolean);
  const ex=document.getElementById("s_exclude").value.split(",").map(s=>s.trim()).filter(Boolean);
  return { payout_pct:(+document.getElementById("s_payout").value||100)/100,
    trap_under_pct:(+document.getElementById("s_trap").value||50)/100,
    max_price:+document.getElementById("s_maxprice").value||2000,
    min_feedback_pct:+document.getElementById("s_seller").value||96,
    alert_min_score:+document.getElementById("s_alert").value||70,
    max_detail_calls:(SET&&SET.max_detail_calls)||30,
    extra_exclude:ex, queries:lines, fast_queries:(SET&&SET.fast_queries)||undefined };
}
function msg(t,c){ const e=document.getElementById("savemsg"); if(e){e.textContent=t; e.style.color=c||"#737373";} }
function copySettings(){ const j=JSON.stringify(gatherSettings(),null,2);
  navigator.clipboard.writeText(j).then(()=>msg("copied — paste into settings.json, commit","#34d399"),
    ()=>msg("copy failed; select textarea manually","#fb7185")); }
function saveToken(){ const t=document.getElementById("s_token").value.trim();
  if(t)localStorage.setItem("gdd_token",t); else localStorage.removeItem("gdd_token");
  msg(t?"token saved on this device":"token cleared","#34d399"); }
async function saveSettings(){
  const body=JSON.stringify(gatherSettings(),null,2), token=localStorage.getItem("gdd_token");
  if(!token){ copySettings(); return; }
  const owner=location.hostname.split(".")[0], repo=location.pathname.split("/").filter(Boolean)[0];
  if(!owner||!repo){ msg("couldn't detect repo; use Copy JSON","#fb7185"); return; }
  const api=`https://api.github.com/repos/${owner}/${repo}/contents/settings.json`;
  const hdr={Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"};
  msg("saving to GitHub…");
  try{ let sha; const g=await fetch(api+"?ref=main",{headers:hdr}); if(g.ok) sha=(await g.json()).sha;
    const put=await fetch(api,{method:"PUT",headers:hdr,body:JSON.stringify({
      message:"update settings from dashboard",content:btoa(unescape(encodeURIComponent(body))),sha,branch:"main"})});
    msg(put.ok?"saved — takes effect next run":"save failed ("+put.status+"); use Copy JSON","#"+(put.ok?"34d399":"fb7185"));
  }catch(e){ msg("save error; use Copy JSON instead","#fb7185"); }
}
