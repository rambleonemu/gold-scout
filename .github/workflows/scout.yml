name: gold-scout
 
on:
  schedule:
    - cron: "7,37 * * * *"   # top-of-hour is GitHub's most contended slot; :23 fires more reliably
  workflow_dispatch:
 
permissions:
  contents: write
  pages: write
  id-token: write
 
concurrency:
  group: pages
  cancel-in-progress: false   # queue overlapping runs; never kill a sweep mid-flight
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Restore memory (alerts + history)
        uses: actions/cache@v4
        with:
          path: |
            seen_ids.json
            history.json
          key: scout-state-${{ github.run_id }}
          restore-keys: |
            scout-state-
      - name: Full sweep
        env:
          SCOUT_MODE: full
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ALERT_MIN_SCORE: "70"
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python3 gold_scout.py
      - name: Heartbeat on failure
        if: failure()
        run: |
          curl -s -H "Title: Gold Scout · RUN FAILED" -H "Priority: urgent" -H "Tags: rotating_light" \
            -d "A scheduled sweep failed (crash, token, or quota). Check the Actions log: https://github.com/${{ github.repository }}/actions" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" || true
      - name: Heartbeat OK (dead-man's-switch)
        if: success()
        env:
          HC_PING_URL: ${{ secrets.HC_PING_URL }}
        run: |
          # Pings healthchecks.io on every SUCCESSFUL sweep. If pings stop arriving
          # (i.e. GitHub silently drops the schedule), healthchecks.io alerts you —
          # which the failure-only ntfy heartbeat above can never do.
          if [ -n "$HC_PING_URL" ]; then
            curl -fsS -m 10 --retry 3 "$HC_PING_URL" || true
          else
            echo "HC_PING_URL secret not set — skipping heartbeat (see setup notes)."
          fi
      - name: Validate sweep output
        run: |
          # Fail loudly if the sweep produced no results.json or an empty/stale one
          if [ ! -f results.json ]; then
            echo "ERROR: results.json missing — sweep failed to write output"; exit 1
          fi
          DEALS=$(python3 -c "import json; d=json.load(open('results.json')); print(len(d.get('deals',[])+d.get('traps',[][:1])))" 2>/dev/null || echo "0")
          UPDATED=$(python3 -c "import json; print(json.load(open('results.json')).get('updated',''))" 2>/dev/null || echo "")
          echo "deals+traps: $DEALS  updated: $UPDATED"
          # Warn but don't fail on 0 deals — market can be dry. Just log it.
          if [ "$DEALS" = "0" ]; then
            echo "WARNING: sweep returned 0 deals and 0 traps — eBay quota or API issue likely"
          fi
      - name: Commit fresh data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json history.json seen_ids.json 2>/dev/null || true
          git diff --cached --quiet && echo "nothing to commit" || \
            git commit -m "scout: update results [skip ci]" && \
            git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Assemble site
        run: |
          mkdir -p site
          cp index.html site/
          cp robots.txt site/
          cp results.json site/
          cp settings.json site/ 2>/dev/null || echo "{}" > site/settings.json
          cp history.json site/ 2>/dev/null || echo "[]" > site/history.json
          for img in GScout_Mascot.png GScout_Favicon.png GScout_Icon.png; do
            [ -f "$img" ] && cp "$img" site/ || echo "skipping $img (not found)"
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
 
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
 
