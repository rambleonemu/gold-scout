name: gold-scout-fast

on:
  schedule:
    - cron: "*/10 13-23 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Restore alert memory
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: scout-state-${{ github.run_id }}
          restore-keys: |
            scout-state-
      - name: Fast alert pass
        env:
          SCOUT_MODE: fast
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ALERT_MIN_SCORE: "70"
        run: python3 gold_scout.py
